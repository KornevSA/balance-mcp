# Прод-стек balance-mcp. TLS терминирует Nginx Proxy Manager (NPM) — публичного
# порта не публикуем. Две external-сети:
#   npm_network  — ingress (NPM → balance-mcp по имени контейнера);
#   balance_net  — внутренний хоп к balance API (http://balance-web/api/v1).
#
# ВАЖНО: проверьте реальное имя сети проекта balance: `docker network ls`
# (обычно <каталог>_default, напр. balance_default) и впишите в balance_net.name.
#
# Деплой:
#   docker compose -f docker-compose.prod.yml up -d --build
name: balance-mcp

services:
  balance-mcp:
    build: .
    image: balance-mcp
    container_name: balance-mcp
    environment:
      PORT: "8080"
      BALANCE_API_BASE: http://balance-web/api/v1
      BALANCE_OAUTH_PUBLIC: https://balance.99p.ru
      BALANCE_OAUTH_INTERNAL: http://balance-web
      PUBLIC_URL: https://balance.99p.ru/mcp
      MCP_INTROSPECTION_CLIENT_ID: ${MCP_INTROSPECTION_CLIENT_ID}
      MCP_INTROSPECTION_CLIENT_SECRET: ${MCP_INTROSPECTION_CLIENT_SECRET}
    networks: [npm_network, balance_net]
    volumes:
      - balance_mcp_data:/data   # кэш само-зарегистрированного introspection-клиента (DCR)
    restart: unless-stopped

networks:
  npm_network:
    external: true
    name: nginx-proxy-manager_default
  balance_net:
    external: true
    name: balance_default   # сеть проекта balance (подтверждено: docker network ls)

volumes:
  balance_mcp_data:
